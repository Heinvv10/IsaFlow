server {
    listen 80;
    server_name fin.fibreflow.app;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name fin.fibreflow.app;

    # SSL - use existing wildcard or generate with certbot
    ssl_certificate /etc/letsencrypt/live/fibreflow.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fibreflow.app/privkey.pem;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Proxy to Next.js
    location / {
        proxy_pass http://127.0.0.1:3101;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    # Static assets caching
    location /_next/static {
        proxy_pass http://127.0.0.1:3101;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Maintenance page on 502/503
    error_page 502 503 /maintenance.html;
    location = /maintenance.html {
        root /var/www/html;
        internal;
    }
}
